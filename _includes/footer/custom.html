<style>
.cna-footer-pills{
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 14px;
  margin: 0 0 22px 0;     /* breathing room before the copyright/social row */

<script>
(function () {
  /* round-9 #1: open every off-site link in a new tab so the user
     doesn't leave the homepage. Same-host and anchor (#) links are
     left alone so in-page nav and scrollspy work as expected. */
  document.querySelectorAll('a[href]').forEach(function (a) {
    var href = a.getAttribute('href');
    if (!href || href.charAt(0) === '#' || href.indexOf('mailto:') === 0) return;
    if (a.hostname && a.hostname !== window.location.hostname) {
      a.setAttribute('target', '_blank');
      var rel = (a.getAttribute('rel') || '').split(/\s+/);
      if (rel.indexOf('noopener') === -1) rel.push('noopener');
      if (rel.indexOf('noreferrer') === -1) rel.push('noreferrer');
      a.setAttribute('rel', rel.filter(Boolean).join(' '));
    }
  });

  /* round-9 #2: scrollspy for the homepage floating section TOC.
     Watches every h1/h2 inside .page__content and toggles
     .is-active on the matching .cna-page-toc-item link. */
  var toc = document.querySelector('.cna-page-toc');
  if (!toc) return;
  var items = toc.querySelectorAll('.cna-page-toc-item');
  var targets = [];
  items.forEach(function (it) {
    var sel = it.getAttribute('href');
    if (!sel || sel.charAt(0) !== '#') return;
    var node = document.querySelector(sel);
    if (node) targets.push({ id: sel.slice(1), node: node, item: it });
  });
  if (!targets.length) return;

  function setActive(id) {
    items.forEach(function (it) { it.classList.remove('is-active'); });
    var match = targets.find(function (t) { return t.id === id; });
    if (match) match.item.classList.add('is-active');
  }

  if ('IntersectionObserver' in window) {
    var io = new IntersectionObserver(function (entries) {
      /* Pick the entry closest to the top of the viewport that is currently
         intersecting. Falls back to last seen section while scrolling past. */
      var visible = entries
        .filter(function (e) { return e.isIntersecting; })
        .sort(function (a, b) { return a.boundingClientRect.top - b.boundingClientRect.top; });
      if (visible.length) setActive(visible[0].target.id);
    }, {
      rootMargin: '-30% 0px -55% 0px',
      threshold: 0
    });
    targets.forEach(function (t) { io.observe(t.node); });
  } else {
    /* fall back: highlight whichever section header has been scrolled past most recently */
    window.addEventListener('scroll', function () {
      var scrollY = window.scrollY + window.innerHeight * 0.3;
      var current = targets[0];
      targets.forEach(function (t) {
        if (t.node.offsetTop <= scrollY) current = t;
      });
      setActive(current.id);
    });
  }

  /* Smooth scroll on TOC click; account for sticky masthead offset */
  items.forEach(function (it) {
    it.addEventListener('click', function (e) {
      var sel = it.getAttribute('href');
      if (!sel || sel.charAt(0) !== '#') return;
      var node = document.querySelector(sel);
      if (!node) return;
      e.preventDefault();
      var headerOffset = 80;
      var top = node.getBoundingClientRect().top + window.scrollY - headerOffset;
      window.scrollTo({ top: top, behavior: 'smooth' });
      history.replaceState(null, '', sel);
    });
  });
})();

/* ---------- Filter Chip Logic (News / Seminar parallel rows) ---------- */
(function () {
  var today = new Date();
  today.setHours(0, 0, 0, 0);

  function toDate(s) { return s ? new Date(s + 'T00:00:00') : null; }

  function applyFilter(row, cards, chip) {
    var kind = row.getAttribute('data-filter-kind');
    var filter = chip.getAttribute('data-filter');
    var targetSel = row.getAttribute('data-filter-target');
    var target = targetSel ? document.querySelector(targetSel) : null;
    var visible = [];

    /* Seminar container: three view modes.
         All      -> remove data-view, keep default <details> grouping
         Upcoming -> data-view="flat", cards flow into one grid without headers
         series   -> data-view="filtered", matching <details> visible with header */
    if (target && kind === 'seminar') {
      if (filter === 'all') {
        target.removeAttribute('data-view');
      } else if (filter === 'upcoming') {
        target.setAttribute('data-view', 'flat');
        Array.prototype.slice.call(target.querySelectorAll('details')).forEach(function (d) { d.open = true; });
      } else {
        target.setAttribute('data-view', 'filtered');
        Array.prototype.slice.call(target.querySelectorAll('details')).forEach(function (d) { d.open = true; });
      }
    }

    if (filter === 'all') {
      visible = cards.slice().sort(function (a, b) {
        return toDate(b.getAttribute('data-date')) - toDate(a.getAttribute('data-date'));
      });
    } else if (filter === 'recent') {
      visible = cards.slice().sort(function (a, b) {
        return toDate(b.getAttribute('data-date')) - toDate(a.getAttribute('data-date'));
      }).slice(0, 5);
    } else if (filter === 'upcoming') {
      visible = cards.slice()
        .filter(function (c) { return toDate(c.getAttribute('data-date')) >= today; })
        .sort(function (a, b) {
          return toDate(a.getAttribute('data-date')) - toDate(b.getAttribute('data-date'));
        })
        .slice(0, 5);
    } else if (kind === 'news') {
      visible = cards
        .filter(function (c) { return c.getAttribute('data-cat') === filter; })
        .sort(function (a, b) {
          return toDate(b.getAttribute('data-date')) - toDate(a.getAttribute('data-date'));
        });
    } else if (kind === 'seminar') {
      visible = cards
        .filter(function (c) { return c.getAttribute('data-series') === filter; })
        .sort(function (a, b) {
          return toDate(a.getAttribute('data-date')) - toDate(b.getAttribute('data-date'));
        });
    }

    var visibleSet = new Set(visible);

    /* News grid: sort visible cards by date via CSS `order` so top-5 (Recent)
       or category filters display in the right sequence when hidden cards
       leave gaps in the flex/grid layout. Seminar keeps cards in their
       original DOM order EXCEPT for Upcoming where cards may come from
       multiple series and need chronological cross-series sort. */
    if (kind === 'news' || (kind === 'seminar' && filter === 'upcoming')) {
      visible.forEach(function (c, i) { c.style.order = String(i + 1); });
      cards.forEach(function (c) {
        if (!visibleSet.has(c)) c.style.order = '';
      });
    } else {
      cards.forEach(function (c) { c.style.order = ''; });
    }

    cards.forEach(function (c) {
      if (visibleSet.has(c)) c.removeAttribute('data-filter-hidden');
      else c.setAttribute('data-filter-hidden', 'true');
    });

    /* Seminar wrapper visibility. Only applies to the 'filtered' (series-chip)
       mode: hide <details> that end up with zero visible cards; the matching
       one keeps its summary header, chevron, and grid. 'All' and 'flat'
       (Upcoming) modes clear data-empty so nothing is unintentionally hidden. */
    if (target && kind === 'seminar') {
      Array.prototype.slice.call(target.querySelectorAll('details')).forEach(function (d) {
        if (filter === 'all' || filter === 'upcoming') {
          d.removeAttribute('data-empty');
          return;
        }
        var hasVisible = Array.prototype.slice.call(d.querySelectorAll('.cna-card'))
          .some(function (c) { return visibleSet.has(c); });
        if (hasVisible) d.removeAttribute('data-empty');
        else d.setAttribute('data-empty', 'true');
      });
    }
  }

  document.querySelectorAll('.cna-filter-row').forEach(function (row) {
    var targetSel = row.getAttribute('data-filter-target');
    var target = targetSel ? document.querySelector(targetSel) : null;
    if (!target) return;
    var cards = Array.prototype.slice.call(target.querySelectorAll('.cna-card'));
    var chips = Array.prototype.slice.call(row.querySelectorAll('.cna-filter-chip'));

    chips.forEach(function (chip) {
      chip.addEventListener('click', function () {
        chips.forEach(function (c) { c.setAttribute('aria-pressed', 'false'); });
        chip.setAttribute('aria-pressed', 'true');
        applyFilter(row, cards, chip);
      });
    });

    var defaultChip = chips.filter(function (c) { return c.getAttribute('aria-pressed') === 'true'; })[0] || chips[0];
    if (defaultChip) applyFilter(row, cards, defaultChip);
  });
})();
</script>
